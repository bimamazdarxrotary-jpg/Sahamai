<!DOCTYPE html>
<html>
<head>

  <title>SahamAI</title>

  <style>

    body{
      background:#0d1117;
      color:white;
      font-family:Arial;
      max-width:800px;
      margin:auto;
      padding:40px 20px;
    }

    input{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      margin-bottom:10px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#16a34a;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    .card{
      background:#161b22;
      margin-top:20px;
      padding:20px;
      border-radius:15px;
    }

  </style>

</head>
<body>

  <h1>📈 SahamAI</h1>

  <input
    type="text"
    id="ticker"
    placeholder="BBCA, TLKM, GOTO"
  >

  <button onclick="analyze()">
    Analisis
  </button>

  <div id="result"></div>

  <script>

    async function analyze(){

      const ticker =
        document
        .getElementById('ticker')
        .value
        .trim()
        .toUpperCase();

      if(!ticker){
        alert('Masukkan ticker');
        return;
      }

      const result =
        document.getElementById('result');

      result.innerHTML =
        '<div class="card">Loading...</div>';

      try{

        const res = await fetch(
          '/api/analyze',
          {
            method:'POST',

            headers:{
              'Content-Type':'application/json'
            },

            body:JSON.stringify({
              ticker
            })
          }
        );

        const data = await res.json();

        result.innerHTML = `
          <div class="card">

            <h2>${ticker}</h2>

            <p>
              <b>Perusahaan:</b>
              ${data.namaLengkap}
            </p>

            <p>
              <b>Sektor:</b>
              ${data.sektor}
            </p>

            <p>
              <b>Sentiment:</b>
              ${data.sentiment}
            </p>

            <p>
              <b>Harga Wajar:</b>
              ${data.priceEst}
            </p>

            <p>
              <b>P/E:</b>
              ${data.pe}
            </p>

            <p>
              <b>P/BV:</b>
              ${data.pbv}
            </p>

            <p>
              <b>Dividend:</b>
              ${data.divYield}
            </p>

            <br>

            <p>${data.summary}</p>

            <br>

            <p>
              <b>Rekomendasi:</b><br>
              ${data.rekomendasi}
            </p>

          </div>
        `;

      }catch(err){

        result.innerHTML = `
          <div class="card">
            Error:
            ${err.message}
          </div>
        `;

      }

    }

  </script>

</body>
</html>
