<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SahamAI — Analis Saham Indonesia</title>
<meta name="description" content="Platform AI analisis saham IHSG. Indikator teknikal matematis, volume intelligence, market structure, scoring deterministik.">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg:    #080b10;
  --bg2:   #0c1018;
  --bg3:   #111620;
  --bg4:   #161d2a;
  --bg5:   #1c2435;
  --emerald:  #00d68f;
  --emerald2: #00b377;
  --emerald-dim: rgba(0,214,143,0.08);
  --gold:     #f0c060;
  --gold-dim: rgba(240,192,96,0.08);
  --red:      #f05060;
  --red-dim:  rgba(240,80,96,0.08);
  --blue:     #5090ff;
  --blue-dim: rgba(80,144,255,0.08);
  --purple:   #c070ff;
  --text:  #dce8f0;
  --text2: #5a7080;
  --text3: #2e404e;
  --bdr:  rgba(255,255,255,0.05);
  --bdr2: rgba(255,255,255,0.08);
  --radius: 12px;
  --font: 'Syne', sans-serif;
  --mono: 'DM Mono', monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 10% 0%, rgba(0,214,143,0.04) 0%, transparent 60%),
             radial-gradient(ellipse 50% 30% at 90% 100%, rgba(80,144,255,0.03) 0%, transparent 60%),
             linear-gradient(var(--bdr) 1px, transparent 1px),
             linear-gradient(90deg, var(--bdr) 1px, transparent 1px);
  background-size:100% 100%,100% 100%,40px 40px,40px 40px;
}

nav{
  position:sticky;top:0;z-index:100;
  background:rgba(8,11,16,0.88);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
  padding:0 1.5rem;height:52px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--emerald2),var(--emerald));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 16px rgba(0,214,143,0.3);}
.nav-wordmark{font-size:15px;font-weight:800;letter-spacing:-0.5px}
.nav-wordmark em{font-style:normal;color:var(--emerald)}
.nav-badge{font-size:9px;background:var(--emerald-dim);color:var(--emerald);padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:1.5px;border:1px solid rgba(0,214,143,0.15);font-family:var(--mono);}
.nav-actions{display:flex;gap:6px}
.nav-btn{font-size:11px;padding:5px 13px;border-radius:7px;color:var(--text2);background:var(--bg3);border:1px solid var(--bdr2);font-family:var(--font);font-weight:600;cursor:pointer;transition:all .15s;}
.nav-btn:hover,.nav-btn.active{border-color:var(--emerald);color:var(--emerald);background:var(--emerald-dim)}

.hero{position:relative;z-index:1;padding:3.5rem 1.5rem 2rem;max-width:960px;margin:0 auto;animation:up .5s ease both;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:10px;color:var(--text2);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1.5rem;}
.hero-dot{width:5px;height:5px;background:var(--emerald);border-radius:50%;animation:pulse 2s infinite}
.hero h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1.1;letter-spacing:-2px;margin-bottom:1rem;}
.hero h1 span{color:var(--emerald)}
.hero-desc{font-size:.9rem;color:var(--text2);max-width:420px;line-height:1.8;margin-bottom:2.5rem;font-weight:400}

.search-wrap{position:relative;z-index:1;max-width:960px;margin:0 auto 1.25rem;padding:0 1.5rem;animation:up .55s ease both;}
.search-box{display:flex;background:var(--bg2);border:1px solid var(--bdr2);border-radius:10px;transition:all .2s;overflow:hidden;}
.search-box:focus-within{border-color:var(--emerald);box-shadow:0 0 0 3px rgba(0,214,143,.06)}
.search-icon{display:flex;align-items:center;padding:0 .9rem 0 1.1rem;color:var(--text3);flex-shrink:0}
#stockInput{flex:1;background:transparent;border:none;outline:none;padding:.85rem .5rem;font-size:.95rem;font-family:var(--mono);color:var(--text);font-weight:500;letter-spacing:2px;text-transform:uppercase;min-width:0;}
#stockInput::placeholder{text-transform:none;letter-spacing:0;font-weight:400;font-family:var(--font);color:var(--text3);font-size:.88rem;}
#analyzeBtn{padding:.6rem 1.1rem;margin:5px;background:var(--emerald);color:#000;border:none;border-radius:7px;font-family:var(--font);font-size:.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap;letter-spacing:.3px;}
#analyzeBtn:hover{background:#1aefaa;transform:scale(1.02)}
#analyzeBtn:disabled{opacity:.4;cursor:not-allowed;transform:none}

.chips{position:relative;z-index:1;display:flex;align-items:center;gap:5px;max-width:960px;margin:0 auto 2rem;padding:0 1.5rem;flex-wrap:wrap;animation:up .6s ease both;}
.chips-lbl{font-size:9px;color:var(--text3);font-weight:700;font-family:var(--mono);letter-spacing:1.5px}
.chip{font-size:10px;padding:4px 11px;border:1px solid var(--bdr2);border-radius:5px;cursor:pointer;color:var(--text2);background:var(--bg2);transition:all .15s;font-weight:600;letter-spacing:1px;font-family:var(--mono);}
.chip:hover,.chip.active{background:var(--emerald-dim);border-color:var(--emerald);color:var(--emerald)}

.watchlist-bar{position:relative;z-index:1;max-width:960px;margin:0 auto .75rem;padding:0 1.5rem}
.wl-title{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:2px;font-family:var(--mono);margin-bottom:.5rem;display:block}
.wl-items{display:flex;flex-wrap:wrap;gap:5px}
.wl-item{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:5px;cursor:pointer;transition:all .15s}
.wl-item:hover{border-color:var(--emerald)}
.wl-ticker{font-size:10px;font-weight:700;font-family:var(--mono);color:var(--text)}
.wl-remove{font-size:13px;color:var(--text3);cursor:pointer}.wl-remove:hover{color:var(--red)}
.wl-add-btn{font-size:10px;padding:4px 11px;background:var(--emerald-dim);border:1px solid rgba(0,214,143,.2);border-radius:5px;color:var(--emerald);cursor:pointer;font-weight:600;font-family:var(--mono);transition:all .15s;display:inline-block;margin-top:6px}

#resultsSection{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 1.5rem 6rem;display:none}

/* ========== STOCKSLY STYLE CARDS ========== */
.stocksly-container { display: flex; flex-direction: column; gap: 8px; }
.card { background: var(--bg2); border: 1px solid var(--bdr); border-radius: var(--radius); padding: 1rem; margin-bottom: 0; animation: up .3s ease both; }

/* Header */
.stocksly-header { background: linear-gradient(135deg, var(--bg2), var(--bg3)); }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.ticker-code { font-size: 24px; font-weight: 800; font-family: var(--mono); letter-spacing: -1px; }
.ticker-name { font-size: 11px; color: var(--text2); margin: 2px 0 4px; }
.sector-badge { font-size: 9px; background: var(--bg4); padding: 2px 8px; border-radius: 4px; color: var(--text3); }
.price-box { text-align: right; }
.last-price { font-size: 22px; font-weight: 700; font-family: var(--mono); }
.change { font-size: 12px; font-weight: 600; }
.change.up { color: var(--emerald); }
.change.down { color: var(--red); }
.risk-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding-top: 8px; border-top: 1px solid var(--bdr); }
.risk-badge { font-size: 10px; padding: 2px 10px; border-radius: 4px; font-weight: 700; }
.risk-badge.konservatif { background: #2e7d64; color: #fff; }
.risk-badge.moderat { background: #f0c060; color: #1a1a2e; }
.risk-badge.agresif { background: #f05060; color: #fff; }
.risk-label { font-size: 9px; color: var(--text3); letter-spacing: 1px; }
.sector-detail { font-size: 9px; color: var(--text2); }

/* Score Card */
.score-card { display: flex; flex-wrap: wrap; gap: 16px; }
.score-left { flex: 1; min-width: 120px; }
.score-label { font-size: 9px; color: var(--text3); letter-spacing: 1.5px; }
.score-number { font-size: 42px; font-weight: 800; font-family: var(--mono); line-height: 1; margin: 8px 0; }
.score-max { font-size: 16px; color: var(--text3); }
.score-recommendation { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; display: inline-block; }
.score-recommendation.buy { background: #00d68f20; color: #00d68f; border: 1px solid #00d68f40; }
.score-recommendation.buy-weakness { background: #f0c06020; color: #f0c060; border: 1px solid #f0c06040; }
.score-recommendation.neutral { background: #5a708020; color: var(--text2); border: 1px solid #5a708040; }
.score-recommendation.sell-strength { background: #f0506020; color: #f05060; border: 1px solid #f0506040; }
.score-recommendation.avoid { background: #f0506040; color: #f05060; border: 1px solid #f05060; }
.score-right { flex: 2; min-width: 200px; }
.gauge-container { background: var(--bg4); border-radius: 8px; padding: 8px 12px; }
.gauge-labels { display: flex; justify-content: space-between; font-size: 7px; color: var(--text3); margin-bottom: 6px; }
.gauge-bar { height: 4px; background: linear-gradient(90deg, #f05060, #5a7080, #00d68f); border-radius: 2px; position: relative; }
.gauge-fill { height: 100%; background: rgba(255,255,255,0.3); border-radius: 2px; width: 0%; }
.gauge-value { position: relative; font-size: 12px; width: 0; top: 6px; transform: translateX(-50%); }
.score-footer { display: flex; justify-content: space-between; margin-top: 16px; font-size: 9px; color: var(--text3); }

/* Smart Money Card */
.smart-card { background: linear-gradient(135deg, #1a1a2e, var(--bg3)); }
.smart-header { font-size: 10px; font-weight: 700; color: var(--gold); margin-bottom: 12px; }
.smart-bar-container { margin-bottom: 8px; }
.smart-bar { display: flex; height: 24px; border-radius: 6px; overflow: hidden; }
.smart-buy-fill { background: #00d68f; display: flex; align-items: center; justify-content: flex-start; padding-left: 8px; color: #000; font-size: 10px; font-weight: 700; }
.smart-sell-fill { background: #f05060; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: #fff; font-size: 10px; font-weight: 700; }
.smart-labels { display: flex; justify-content: space-between; font-size: 9px; margin-top: 4px; }
.buy-label { color: #00d68f; }
.sell-label { color: #f05060; }
.smart-footer { display: flex; justify-content: space-between; font-size: 9px; padding-top: 8px; border-top: 1px solid var(--bdr); }

/* Kondisi Harga */
.kondisi-header { font-size: 10px; font-weight: 700; color: var(--text2); margin-bottom: 12px; }
.kondisi-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
.kondisi-item { flex: 1; }
.kondisi-label { font-size: 8px; color: var(--text3); display: block; margin-bottom: 4px; }
.kondisi-value.large { font-size: 24px; font-weight: 700; font-family: var(--mono); }
.kondisi-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 700; display: inline-block; }
.kondisi-badge.extreme { background: #f05060; color: #fff; }
.kondisi-badge.high { background: #f0c060; color: #1a1a2e; }
.kondisi-badge.medium { background: #5a7080; color: #fff; }
.kondisi-badge.normal { background: #2e7d64; color: #fff; }
.kondisi-sub { font-size: 9px; color: var(--text2); margin-left: 6px; }
.ma-values { display: flex; gap: 12px; }
.ma-values .above { color: #00d68f; }
.ma-values .below { color: #f05060; }

/* Entry Card */
.entry-card { background: linear-gradient(135deg, #0f2120, var(--bg3)); border: 1px solid #00d68f30; }
.entry-header { font-size: 10px; font-weight: 700; color: #00d68f; margin-bottom: 8px; }
.entry-zone { font-size: 22px; font-weight: 800; font-family: var(--mono); color: #00d68f; margin: 8px 0; }
.entry-label { font-size: 8px; color: var(--text3); letter-spacing: 1px; margin-bottom: 10px; }
.entry-tags { display: flex; gap: 8px; }
.entry-tags .tag { font-size: 9px; padding: 3px 8px; background: var(--bg4); border-radius: 4px; }
.entry-tags .tag.good { background: #00d68f20; color: #00d68f; }

/* Risk Card */
.risk-card { background: var(--bg3); }
.risk-row-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 10px; }
.rr-value { font-weight: 700; color: var(--gold); }
.complexity-badge { padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; }
.complexity-badge.low { background: #2e7d64; }
.complexity-badge.medium { background: #f0c060; color: #1a1a2e; }
.complexity-badge.high { background: #f05060; }
.volume-stats { display: flex; justify-content: space-between; font-size: 9px; color: var(--text2); margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--bdr); }

/* AI Card */
.ai-card { background: var(--bg2); }
.ai-summary { font-size: 12px; line-height: 1.6; color: var(--text); margin-bottom: 12px; }
.ai-recommendation { font-size: 11px; padding: 8px; background: var(--bg4); border-radius: 6px; color: var(--text2); }

/* Disclaimer */
.disclaimer { font-size: 8px; color: var(--text3); text-align: center; padding: 12px; line-height: 1.5; }

/* Chart Card */
.chart-card { background: var(--bg2); border: 1px solid var(--bdr); border-radius: var(--radius); padding: 1rem; margin-bottom: 8px; }
.chart-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: .9rem; flex-wrap: wrap; gap: 6px; }
.chart-title { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 2px; font-family: var(--mono); }
.chart-ctrls { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.ctab { font-size: 9px; padding: 3px 9px; border-radius: 4px; cursor: pointer; color: var(--text2); background: var(--bg3); border: 1px solid var(--bdr); font-family: var(--mono); font-weight: 600; transition: all .15s; }
.ctab.active, .ctab:hover { background: var(--emerald-dim); border-color: var(--emerald); color: var(--emerald); }
.ctab-type.active, .ctab-type:hover { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
#tvChart { width: 100%; height: 280px; border-radius: 6px; overflow: hidden; }
#rsiChart { width: 100%; height: 80px; border-radius: 6px; overflow: hidden; margin-top: 3px; }
#macdChart { width: 100%; height: 80px; border-radius: 6px; overflow: hidden; margin-top: 3px; }
.ind-toggles { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 7px; }
.ind-toggle { font-size: 8px; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-family: var(--mono); font-weight: 700; letter-spacing: .5px; border: 1px solid; transition: all .15s; user-select: none; }
.ind-toggle.on-ma20 { background: rgba(240,192,96,.1); border-color: rgba(240,192,96,.4); color: var(--gold); }
.ind-toggle.off-ma20 { background: transparent; border-color: var(--bdr); color: var(--text3); }
.ind-toggle.on-ma50 { background: var(--blue-dim); border-color: rgba(80,144,255,.4); color: var(--blue); }
.ind-toggle.off-ma50 { background: transparent; border-color: var(--bdr); color: var(--text3); }
.ind-toggle.on-ema9 { background: var(--emerald-dim); border-color: rgba(0,214,143,.4); color: var(--emerald); }
.ind-toggle.off-ema9 { background: transparent; border-color: var(--bdr); color: var(--text3); }
.ind-toggle.on-bb { background: rgba(192,112,255,.1); border-color: rgba(192,112,255,.4); color: var(--purple); }
.ind-toggle.off-bb { background: transparent; border-color: var(--bdr); color: var(--text3); }
.ind-toggle.on-rsi { background: var(--red-dim); border-color: rgba(240,80,96,.4); color: var(--red); }
.ind-toggle.off-rsi { background: transparent; border-color: var(--bdr); color: var(--text3); }
.ind-toggle.on-macd { background: var(--emerald-dim); border-color: rgba(0,214,143,.3); color: var(--emerald); }
.ind-toggle.off-macd { background: transparent; border-color: var(--bdr); color: var(--text3); }
.subpanel { display: none; background: var(--bg3); border-radius: 6px; padding: 4px 6px; margin-top: 3px; }
.subpanel.visible { display: block; }
.subpanel-lbl { font-size: 7px; color: var(--text3); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; font-family: var(--mono); }

/* Scanner */
#scannerSection { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 1.5rem 6rem; display: none; }
.scanner-hdr { margin-bottom: 1.1rem; }
.scanner-title { font-size: 1.1rem; font-weight: 800; letter-spacing: -.5px; margin-bottom: 2px; }
.scanner-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.scan-filters { display: flex; gap: 5px; margin-bottom: 1rem; align-items: center; overflow-x: auto; padding-bottom: 3px; white-space: nowrap; }
.sf-btn { font-size: 9px; padding: 5px 11px; border-radius: 5px; cursor: pointer; color: var(--text2); background: var(--bg2); border: 1px solid var(--bdr2); font-family: var(--mono); font-weight: 700; letter-spacing: .5px; transition: all .15s; }
.sf-btn:hover, .sf-btn.active { background: var(--emerald-dim); border-color: var(--emerald); color: var(--emerald); }
.scan-run-btn { padding: 6px 18px; background: var(--emerald); color: #000; border: none; border-radius: 7px; font-family: var(--font); font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .2s; }
.scan-run-btn:hover { background: #1aefaa; }
.scan-run-btn:disabled { opacity: .4; cursor: not-allowed; }
.scan-list { display: flex; flex-direction: column; gap: 6px; }
.sc-row { background: var(--bg2); border: 1px solid var(--bdr); border-left: 2px solid transparent; border-radius: var(--radius); padding: .85rem 1rem; cursor: pointer; transition: all .2s; display: grid; grid-template-columns: auto 1fr auto auto auto; align-items: center; gap: .75rem; }
.sc-row:hover { border-color: var(--bdr2); transform: translateX(2px); }
.sc-row.bull { border-left-color: var(--emerald); }
.sc-row.bear { border-left-color: var(--red); }
.sc-avatar { width: 36px; height: 36px; border-radius: 8px; background: var(--bg3); border: 1px solid var(--bdr2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; font-family: var(--mono); }
.sc-info .sc-ticker { font-family: var(--mono); font-size: .92rem; font-weight: 700; }
.sc-info .sc-name { font-size: 9px; color: var(--text3); }
.sc-price-col { text-align: right; }
.sc-price { font-family: var(--mono); font-size: .88rem; font-weight: 700; }
.sc-chg { font-size: 9px; font-weight: 700; }
.sc-chg.up { color: var(--emerald); }
.sc-chg.down { color: var(--red); }
.sc-score-val { font-family: var(--mono); font-size: 1.1rem; font-weight: 800; }
.sc-sigs { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.sc-sig { font-size: 8px; padding: 2px 6px; border-radius: 3px; font-weight: 700; }
.sc-sig.high { background: var(--emerald-dim); border: 1px solid rgba(0,214,143,.2); color: var(--emerald); }
.scan-stats { display: flex; gap: 14px; margin-bottom: .75rem; }
.scan-stat-num { font-family: var(--mono); font-size: 1rem; font-weight: 700; }
.scanner-empty { text-align: center; padding: 3rem; color: var(--text3); font-size: 12px; }

/* Toast, Skeleton, dll */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--bdr2); padding: 8px 16px; border-radius: 7px; font-size: 11px; color: var(--text); z-index: 999; animation: up .3s ease; white-space: nowrap; max-width: 90vw; }
.toast.error { border-color: rgba(240,80,96,.4); color: var(--red); }
.toast.ok { border-color: rgba(0,214,143,.4); color: var(--emerald
